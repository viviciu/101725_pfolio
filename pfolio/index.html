  <div class="view-toggle" id="view-toggle">
    <button class="view-toggle-btn" data-view="list" aria-label="List view">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="14" height="1.5" rx="0.5" fill="currentColor"/><rect x="1" y="7" width="14" height="1.5" rx="0.5" fill="currentColor"/><rect x="1" y="12" width="14" height="1.5" rx="0.5" fill="currentColor"/></svg>
    </button>
    <button class="view-toggle-btn active" data-view="grid" aria-label="Grid view">

        <span class="label-meta">Visualization • Locked</span>
        <a class="z-50 text-left font-ABCDiatypeReg font-normal pointer-events-none" href="/seaglass/">Seaglass • Gentle Systems</a>
      </li>
      <!-- GAP -->
      <li class="list-none w-[40rem] flex items-baseline">
        <span class="label-meta">Visualization</span>
        <a class="z-50 text-left font-ABCDiatypeReg font-normal" href="/c4d/">C4D Explorations</a>

        <a class="z-50 text-left font-ABCDiatypeReg font-normal" href="/mile10/">Mile 10 • OEM</a>

      <li class="pt-5 flex items-baseline">

      <li class="pb-5 flex items-baseline">
